project:
  name: softvc-f0
  seed: 1234

paths:
  base_dir: data
  processed_dir: processed
  train_manifest: manifests/manifest_train.jsonl
  dev_manifest: manifests/manifest_dev.jsonl
  checkpoints_dir: checkpoints

device:
  torch: auto

logging:
  wandb:
    enabled: true
    project: signing-conversion
    run_name: softvc-f0
    tags: []
    log_checkpoints: false

train:
  batch_size: 16
  num_workers: 0
  train_eval_batches: 4
  learning_rate: 0.0004
  weight_decay: 0.00001
  betas: [0.8, 0.99]
  grad_clip_norm: 1.0
  max_steps: 80000
  log_every: 50 
  eval_every: 50
  save_every: 100

model:
  name: softvc_f0
  content_dim: 256
  speaker_dim: 256
  upsample: true
  mel_dim: 128
